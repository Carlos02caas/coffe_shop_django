{% extends "base.html" %}
{% load tailwind_filters %}

{% block content %}
<div class="mx-auto py-5 bg-[#2F3D4C]">
    <h1 class="text-3xl font-bold uppercase text-center">Registro</h1>
</div>
<div class="min-h-[calc(100vh-80px)] flex items-center justify-center bg-(--light-blue)">

    <div class="w-full max-w-md bg-(--accent) rounded-lg shadow-lg p-8">

        <form action="" method="post" class="space-y-6">
            {% csrf_token %}

            {{ form|crispy }}

            <button
                class="w-full rounded-md border border-(--light-blue) bg-(--light-blue) px-8 py-3 text-sm font-medium text-(--primary) cursor-pointer transition hover:scale-[1.02] hover:shadow-lg hover:bg-(--primary) hover:text-(--light-blue)"
                type="submit">
                Registrar
            </button>

        </form>

    </div>

</div>
{% endblock content%}
